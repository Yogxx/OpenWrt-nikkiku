name: testing-nikki-packages

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag release"
        required: false
        default: "v1.25.x"

env:
  UPLOAD_TELEGRAM: ${{ github.event_name == 'push' && 'true' || 'false' }}

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from Makefile
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            PKG_VERSION=$(grep -m1 'PKG_VERSION:=' Makefile | cut -d'=' -f2 | tr -d ' ')
            echo "tag=v${PKG_VERSION}" >> $GITHUB_OUTPUT
          fi

  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    needs: get-version

    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic
          - aarch64_cortex-a72
          - x86_64
        branch:
          - openwrt-24.10
          - openwrt-25.12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: nikki
          PACKAGES: luci-app-nikki
          INDEX: 1
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NO_REFRESH_CHECK: true

      - name: Compress output
        run: |
          tar -czf nikki_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz \
            -C bin/packages/${{ matrix.arch }}/nikki .

      - name: Upload Telegram
        if: env.UPLOAD_TELEGRAM == 'true'
        run: |
          curl -s -F document=@nikki_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz \
            -F chat_id=${{ secrets.TG_CHAT_ID }} \
            -F caption="📦 Nikki ${{ needs.get-version.outputs.tag }} | ${{ matrix.arch }} | ${{ matrix.branch }}" \
            https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendDocument
